<!DOCTYPE html>
<html lang="pt-BR" data-tema="claro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sesc Acre — Agendamento de Espaços. Reserve quadras, auditórios, salão de festas e campo em Rio Branco, AC.">
  <title>Espaços — Sesc Acre</title>
  <link rel="icon" href="./logos/icone-site.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,500&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    /* ===== MESMO CSS DO lanchonete.html (header e hero) + CSS ORIGINAL DOS ESPAÇOS ===== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primaria: #f5a800;
      --primaria-escura: #d48f00;
      --primaria-p: #fff8e7;
      --primaria-m: #ffe7b3;
      --azul: #004A93;
      --azul-escura: #003370;
      --azul-clara: #0060BB;
      --azul-p: #E8F1FA;
      --azul-m: #C8DEFA;
      --verde: #15803d;
      --verde-p: #dcfce7;
      --red: #dc2626;
      --red-p: #fee2e2;
      --orange: #EA580C;
      --orange-p: #FFF0E8;
      --roxo: #7C3AED;
      --roxo-p: #EDE9FE;
      --bg: #f5f7fa;
      --surface: #ffffff;
      --surface-2: #f9fafb;
      --border: #e4e7ed;
      --border-2: #d1d5db;
      --text-1: #111827;
      --text-2: #374151;
      --text-3: #6b7280;
      --text-4: #9ca3af;
      --s1: 0 1px 4px rgba(0, 0, 0, 0.06);
      --s2: 0 4px 16px rgba(0, 0, 0, 0.09);
      --s3: 0 8px 32px rgba(0, 0, 0, 0.13);
      --s4: 0 20px 60px rgba(0, 74, 147, 0.18);
      --r1: 8px;
      --r2: 12px;
      --r3: 16px;
      --r4: 24px;
      --r5: 32px;
      --fd: "Fraunces", Georgia, serif;
      --fb: "Outfit", "Segoe UI", sans-serif;
      --nav-h: 64px;
      --ease: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    [data-tema="escuro"] {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-2: #1c2128;
      --border: #30363d;
      --border-2: #3d444d;
      --text-1: #e6edf3;
      --text-2: #c9d1d9;
      --text-3: #8b949e;
      --text-4: #6e7681;
      --azul-p: rgba(0, 74, 147, 0.22);
      --azul-m: rgba(0, 74, 147, 0.4);
      --primaria-p: rgba(245, 168, 0, 0.22);
      --primaria-m: rgba(245, 168, 0, 0.4);
      --verde-p: rgba(21, 128, 61, 0.18);
      --red-p: rgba(220, 38, 38, 0.18);
      --roxo-p: rgba(124, 58, 237, 0.18);
      --orange-p: rgba(234, 88, 12, 0.18);
      --s1: 0 1px 4px rgba(0, 0, 0, 0.5);
      --s2: 0 4px 16px rgba(0, 0, 0, 0.35);
      --s3: 0 8px 32px rgba(0, 0, 0, 0.4);
      --s4: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--fb);
      background: var(--bg);
      color: var(--text-1);
      line-height: 1.6;
      transition: background 0.3s, color 0.3s;
      overflow-x: hidden;
    }

    img {
      display: block;
      max-width: 100%;
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
      font-family: var(--fb);
    }

    input, select, textarea {
      font-family: var(--fb);
    }

    /* ===== HEADER (mesmo do lanchonete) ===== */
    #header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
    }

    .logo-header {
      height: auto;
      width: 3vi;
      min-width: 45px;
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 3vi;
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .brand-name {
      font-family: var(--fd);
      font-size: 0.95rem;
      font-weight: 900;
      color: #fff;
    }

    .brand-sub {
      font-size: 0.62rem;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .btn-tema {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.8);
      transition: var(--ease);
    }

    .btn-tema:hover {
      background: rgba(255, 255, 255, 0.22);
    }

    /* ===== HERO (mesmo estilo do lanchonete) ===== */
    .page-hero {
      background: linear-gradient(160deg, #0D3B1A 0%, #145A2B 60%, #1A7A38 100%);
      padding: 3rem 1.5rem 2.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .logo-geral {
      margin: 0 auto;
      width: 25vi;
      color: var(--primaria-p);
    }

    .page-hero-title {
      font-family: var(--fd);
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .page-hero-title em {
      font-style: italic;
      color: var(--primaria);
    }

    .page-hero-desc {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.7);
      max-width: 420px;
      margin: 0 auto;
      text-decoration: none;
      display: inline-block;
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      border-radius: var(--r3);
      padding: 0.75rem 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .hero-stat-num {
      font-family: var(--fd);
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--primaria);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 0.68rem;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 0.2rem;
    }

    /* ===== BOTÕES ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.65rem 1.35rem;
      border-radius: var(--r1);
      font-weight: 700;
      font-size: 0.875rem;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
      font-family: var(--fb);
    }

    .btn-primary {
      background: var(--azul);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--azul-escura);
      transform: translateY(-1px);
      box-shadow: var(--s2);
    }

    .btn-verde {
      background: var(--verde);
      color: #fff;
    }

    .btn-verde:hover {
      background: #116830;
      transform: translateY(-1px);
    }

    .btn-outline {
      border: 1.5px solid var(--border);
      color: var(--text-2);
      background: transparent;
    }

    .btn-outline:hover {
      background: var(--surface-2);
      border-color: var(--azul);
      color: var(--azul);
    }

    .btn-sm {
      padding: 0.4rem 0.9rem;
      font-size: 0.8rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.2rem 0.65rem;
    }

    .pill-azul { background: var(--azul-p); color: var(--azul); }
    .pill-roxo { background: var(--roxo-p); color: var(--roxo); }
    .pill-orange { background: var(--orange-p); color: var(--orange); }
    .pill-verde { background: var(--verde-p); color: var(--verde); }
    .pill-gray { background: var(--surface-2); color: var(--text-3); border: 1px solid var(--border); }

    /* ===== FILTROS ===== */
    .cat-filter-bar {
      max-width: 1280px;
      margin: 1.5rem auto 2rem;
      padding: 0 1.5rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .cat-filter-btn {
      padding: 0.55rem 1.2rem;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--border);
      color: var(--text-2);
      background: var(--surface);
      transition: all 0.2s;
      font-family: var(--fb);
    }

    .cat-filter-btn:hover {
      border-color: var(--azul);
      color: var(--azul);
      background: var(--azul-p);
    }

    .cat-filter-btn.ativo {
      background: var(--azul);
      border-color: var(--azul);
      color: #fff;
    }

    /* ===== GRID DE ESPAÇOS ===== */
    .espacos-grid {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    .espaco-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r4);
      overflow: hidden;
      cursor: pointer;
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.5s ease, transform 0.5s ease, box-shadow 0.28s ease, border-color 0.28s ease;
    }

    .espaco-card.card-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .espaco-card:hover {
      box-shadow: var(--s4);
      border-color: var(--azul-m);
    }

    .espaco-img {
      height: 220px;
      overflow: hidden;
      position: relative;
    }

    .espaco-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .espaco-card:hover .espaco-img img {
      transform: scale(1.08);
    }

    .espaco-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.45) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .espaco-card:hover .espaco-img::after {
      opacity: 1;
    }

    .card-hover-cta {
      position: absolute;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(255, 255, 255, 0.95);
      color: var(--azul);
      border-radius: 100px;
      padding: 0.45rem 1.1rem;
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      backdrop-filter: blur(4px);
    }

    .espaco-card:hover .card-hover-cta {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .espaco-badge-cat {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 2;
    }

    .espaco-cap-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 2;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      border-radius: 100px;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.22rem 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      backdrop-filter: blur(4px);
    }

    .espaco-body {
      padding: 1.4rem;
    }

    .espaco-name {
      font-family: var(--fd);
      font-size: 1.15rem;
      font-weight: 900;
      color: var(--text-1);
      margin-bottom: 0.35rem;
    }

    .espaco-desc {
      font-size: 0.83rem;
      color: var(--text-3);
      line-height: 1.6;
      margin-bottom: 0.75rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .espaco-meta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 0.9rem;
    }

    .espaco-meta-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.78rem;
      color: var(--text-3);
    }

    .espaco-footer {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      padding-top: 0.9rem;
      border-top: 1px solid var(--border);
    }

    /* ===== DRAWER ===== */
    #drawer-overlay {
      position: fixed;
      inset: 0;
      z-index: 1100;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    #drawer-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    #drawer {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      z-index: 1200;
      width: min(620px, 100vw);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      box-shadow: -8px 0 40px rgba(0, 0, 0, 0.18);
    }

    #drawer.open {
      transform: translateX(0);
    }

    .drawer-foto {
      height: 260px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      background: var(--surface-2);
    }

    .drawer-foto img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .drawer-foto-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.65) 0%, transparent 55%);
    }

    .drawer-foto-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
    }

    .drawer-foto-nome {
      font-family: var(--fd);
      font-size: 1.5rem;
      font-weight: 900;
      color: #fff;
      line-height: 1.15;
    }

    .drawer-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      font-size: 1rem;
      backdrop-filter: blur(4px);
    }

    .drawer-close:hover {
      background: rgba(220, 38, 38, 0.7);
    }

    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }

    .drawer-badges {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .drawer-desc {
      font-size: 0.9rem;
      color: var(--text-2);
      line-height: 1.75;
      margin-bottom: 1.25rem;
    }

    .drawer-specs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }

    .drawer-spec {
      background: var(--surface-2);
      border-radius: var(--r2);
      padding: 0.85rem 1rem;
      border: 1px solid var(--border);
    }

    .drawer-spec-icon {
      font-size: 1.1rem;
      margin-bottom: 0.2rem;
    }

    .drawer-spec-label {
      font-size: 0.7rem;
      color: var(--text-4);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.15rem;
    }

    .drawer-spec-val {
      font-size: 0.88rem;
      color: var(--text-1);
      font-weight: 600;
    }

    .drawer-regras {
      background: var(--primaria-p);
      border: 1px solid rgba(245, 168, 0, 0.3);
      border-radius: var(--r2);
      padding: 1rem 1.1rem;
      margin-bottom: 1.5rem;
      font-size: 0.83rem;
      color: var(--text-2);
    }

    .drawer-regras strong {
      color: var(--primaria-escura);
    }

    .drawer-footer {
      padding: 1.25rem 1.5rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface);
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .drawer-antec {
      font-size: 0.78rem;
      color: var(--text-4);
      flex: 1;
    }

    /* ===== MODAL FORMULÁRIO (3 passos) ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1300;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(6px);
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 1.5rem 1rem;
      overflow-y: auto;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal-box {
      background: var(--surface);
      border-radius: var(--r4);
      width: 100%;
      max-width: 680px;
      box-shadow: var(--s4);
      animation: modalIn 0.28s var(--spring);
      margin: auto;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.9) translateY(16px); }
      to { opacity: 1; transform: none; }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.35rem 1.5rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
      border-radius: var(--r4) var(--r4) 0 0;
    }

    .modal-title {
      font-family: var(--fd);
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--text-1);
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-3);
      transition: all 0.2s;
    }

    .modal-close:hover {
      background: var(--red-p);
      color: var(--red);
      border-color: var(--red);
    }

    .modal-body {
      padding: 1.5rem;
      max-height: 75vh;
      overflow-y: auto;
    }

    .modal-footer {
      padding: 1.1rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    /* Stepper */
    .stepper {
      display: flex;
      align-items: center;
      margin-bottom: 2rem;
    }

    .stp-col {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stp-circle {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-4);
      background: var(--surface);
      transition: all 0.3s;
    }

    .stp-circle.ativo {
      border-color: var(--azul);
      background: var(--azul);
      color: #fff;
    }

    .stp-circle.feito {
      border-color: var(--verde);
      background: var(--verde);
      color: #fff;
    }

    .stp-label {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-4);
      margin-top: 0.3rem;
      white-space: nowrap;
    }

    .stp-label.ativo {
      color: var(--azul);
    }

    .stp-label.feito {
      color: var(--verde);
    }

    .stp-linha {
      flex: 1;
      height: 2px;
      background: var(--border);
      margin: 0 0.4rem;
      margin-bottom: 1rem;
    }

    .stp-linha.feita {
      background: var(--verde);
    }

    /* Formulário */
    .form-group {
      margin-bottom: 1.1rem;
    }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 0.72rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: var(--r1);
      font-size: 0.9rem;
      color: var(--text-1);
      background: var(--surface);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--azul);
      box-shadow: 0 0 0 3px rgba(0, 74, 147, 0.1);
    }

    .form-input.error {
      border-color: var(--red);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }

    /* Calendário */
    .cal-wrap {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 1.1rem;
      margin-bottom: 1rem;
    }

    .cal-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .cal-mes-titulo {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text-1);
    }

    .cal-nav-btn {
      width: 28px;
      height: 28px;
      border-radius: var(--r1);
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: var(--azul);
      transition: all 0.2s;
    }

    .cal-nav-btn:hover {
      background: var(--azul-p);
      border-color: var(--azul);
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .cal-header-dia {
      text-align: center;
      font-size: 0.67rem;
      font-weight: 700;
      color: var(--text-4);
      padding: 0.25rem 0;
      text-transform: uppercase;
    }

    .cal-dia {
      text-align: center;
      padding: 0.38rem 0.2rem;
      border-radius: var(--r1);
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .cal-dia:hover:not(.vazio):not(.passado):not(.ocupado) {
      background: var(--azul-p);
      color: var(--azul);
    }

    .cal-dia.sel {
      background: var(--azul);
      color: #fff;
      font-weight: 700;
    }

    .cal-dia.ocupado {
      background: var(--red-p);
      color: var(--red);
      cursor: not-allowed;
    }

    .cal-dia.passado {
      color: var(--border-2);
      cursor: not-allowed;
    }

    .cal-dia.vazio {
      cursor: default;
    }

    .cal-legenda {
      display: flex;
      gap: 0.9rem;
      margin-top: 0.5rem;
      flex-wrap: wrap;
    }

    .leg-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.7rem;
      color: var(--text-3);
    }

    .leg-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
    }

    .data-chip {
      display: none;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 0.85rem;
      background: var(--azul-p);
      border-radius: 100px;
      font-size: 0.82rem;
      color: var(--azul);
      font-weight: 600;
      margin-bottom: 0.85rem;
      width: fit-content;
    }

    /* Resumo e Sucesso */
    .resumo-row {
      display: flex;
      justify-content: space-between;
      padding: 0.65rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.87rem;
    }

    .resumo-label {
      color: var(--text-3);
      font-weight: 500;
    }

    .resumo-val {
      color: var(--text-1);
      font-weight: 600;
      text-align: right;
      max-width: 58%;
    }

    .termos-row {
      margin-top: 1.1rem;
      padding: 0.9rem 1rem;
      background: var(--surface-2);
      border-radius: var(--r2);
      border: 1px solid var(--border);
    }

    .termos-row label {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      cursor: pointer;
      font-size: 0.84rem;
      color: var(--text-2);
    }

    .termos-row input[type=checkbox] {
      width: 16px;
      height: 16px;
      margin-top: 2px;
      accent-color: var(--azul);
      flex-shrink: 0;
    }

    .sucesso-box {
      background: var(--verde-p);
      border: 1px solid rgba(21, 128, 61, 0.3);
      border-radius: var(--r3);
      padding: 2rem;
      text-align: center;
      color: var(--verde);
    }

    .sucesso-icon {
      font-size: 3rem;
      margin-bottom: 0.75rem;
      animation: bounce 0.6s var(--spring);
    }

    @keyframes bounce {
      0% { transform: scale(0); }
      60% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .sucesso-titulo {
      font-family: var(--fd);
      font-size: 1.35rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
    }

    .sucesso-protocolo {
      font-size: 0.82rem;
      opacity: 0.75;
      margin-top: 0.75rem;
      font-weight: 600;
    }

    .fs-erro-box {
      background: var(--red-p);
      border: 1px solid rgba(220, 38, 38, 0.3);
      border-radius: var(--r2);
      padding: 1rem 1.25rem;
      color: var(--red);
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
      display: none;
    }

    /* FOOTER */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      text-align: center;
      font-size: 0.73rem;
      color: var(--text-4);
    }

    footer strong {
      color: var(--text-3);
    }

    /* TOASTS */
    #toasts {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 9999;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 0.65rem 1rem;
      font-size: 0.8rem;
      font-weight: 500;
      box-shadow: var(--s2);
      animation: slideIn 0.25s ease;
      max-width: 280px;
    }

    .toast.fadeout {
      animation: fadeOut 0.3s ease forwards;
    }

    .toast-verde { color: #166534; border-color: #bbf7d0; }
    .toast-azul { color: var(--primaria); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: none; }
    }

    @keyframes fadeOut {
      to { opacity: 0; transform: translateY(8px); }
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
      .drawer-specs {
        grid-template-columns: 1fr;
      }
      #drawer {
        width: 100vw;
      }
      .espacos-grid {
        grid-template-columns: 1fr;
        padding: 0 1rem;
      }
      .cat-filter-bar {
        padding: 0 1rem;
      }
    }

    @media (max-width: 640px) {
      .hero-stats {
        gap: 1rem;
      }
      .hero-stat {
        padding: 0.5rem 1rem;
      }
      .hero-stat-num {
        font-size: 1.3rem;
      }
    }
  </style>
</head>

  <script>
    // ==================== DADOS ====================
    const ESPACOS_PADRAO = [

      { id: 'e2', nome: 'Auditório Principal', capacidade: 150, categoria: 'Eventos', emoji: '🎤', descricao: 'Auditório climatizado com som profissional, projeção Full HD, palco e camarim.', horarios: 'Seg–Sex: 8h–21h', antecedencia: 'Mín. 72h', fotos: ['https://images.unsplash.com/photo-1511578314322-379afb476865?w=600&q=80'], regras: 'Reserva sujeita à aprovação da gerência.' },
      { id: 'e3', nome: 'Auditório 2', capacidade: 60, categoria: 'Eventos', emoji: '📽️', descricao: 'Sala multiuso com TV interativa, videoconferência e mobiliário flexível.', horarios: 'Seg–Sex: 8h–18h', antecedencia: 'Mín. 48h', fotos: ['https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=600&q=80'], regras: 'Uso exclusivo para associados.' },
      { id: 'e4', nome: 'Salão de Festas', capacidade: 200, categoria: 'Eventos', emoji: '🎉', descricao: 'Salão elegante com cozinha industrial, sistema de som e estacionamento amplo.', horarios: 'Sáb: 8h–23h | Dom: 8h–20h', antecedencia: 'Mín. 7 dias', fotos: ['https://images.unsplash.com/photo-1519167758481-83f550bb49b3?w=600&q=80'], regras: 'Caução obrigatória. Limpeza responsabilidade do solicitante.' },
      { id: 'e5', nome: 'Campo Society', capacidade: 22, categoria: 'Esporte', emoji: '⚽', descricao: 'Campo gramado natural com iluminação noturna e vestiários.', horarios: 'Seg–Sex: 17h–22h | Sáb/Dom: 8h–22h', antecedencia: 'Mín. 24h', fotos: ['https://images.unsplash.com/photo-1459865264687-595d652de67e?w=600&q=80'], regras: 'Apenas chuteiras de borracha.' },
      { id: 'e6', nome: 'Sala de Reuniões', capacidade: 20, categoria: 'Corporativo', emoji: '💼', descricao: 'Sala corporativa com projetor 4K, quadro interativo e Wi-Fi de alta velocidade.', horarios: 'Seg–Sex: 8h–18h', antecedencia: 'Mín. 24h', fotos: ['https://images.unsplash.com/photo-1497366216548-37526070297c?w=600&q=80'], regras: 'Uso exclusivo para associados.' }
    ];

    let espacos = [...ESPACOS_PADRAO];
    let filtroAtual = 'todos';
    let espacoSelecionado = null;
    let passoAtual = 1;
    let dataSelecionada = null;
    let calMes = new Date().getMonth();
    let calAno = new Date().getFullYear();

    const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const DIAS_S = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

    function getCategoriaCor(cat) {
      if (cat === 'Esporte') return 'azul';
      if (cat === 'Eventos') return 'roxo';
      return 'orange';
    }

    function renderizarEspacos() {
      const grid = document.getElementById('espacos-grid');
      const lista = filtroAtual === 'todos' ? espacos : espacos.filter(e => e.categoria === filtroAtual);
      grid.innerHTML = lista.map((e, i) => `
        <div class="espaco-card" style="transition-delay:${i*0.05}s" onclick="abrirDrawer('${e.id}')">
          <div class="espaco-img">
            <img src="${e.fotos[0]}" alt="${e.nome}" loading="lazy">
            <div class="espaco-badge-cat"><span class="pill pill-${getCategoriaCor(e.categoria)}">${e.categoria}</span></div>
            <div class="espaco-cap-badge">👥 ${e.capacidade}</div>
            <div class="card-hover-cta">🔍 Ver detalhes</div>
          </div>
          <div class="espaco-body">
            <div class="espaco-name">${e.nome}</div>
            <div class="espaco-desc">${e.descricao.substring(0, 100)}...</div>
            <div class="espaco-meta"><div class="espaco-meta-item">🕒 ${e.horarios}</div><div class="espaco-meta-item">⏱️ ${e.antecedencia}</div></div>
            <div class="espaco-footer">
              <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();abrirDrawer('${e.id}')">👁️ Detalhes</button>
              <button class="btn btn-verde btn-sm" onclick="event.stopPropagation();selecionarEspacoEReservar('${e.id}')">📋 Reservar</button>
            </div>
          </div>
        </div>
      `).join('');
      
      const observer = new IntersectionObserver(entries => {
        entries.forEach(en => { if (en.isIntersecting) { en.target.classList.add('card-visible'); observer.unobserve(en.target); } });
      }, { threshold: 0.1 });
      document.querySelectorAll('.espaco-card').forEach(card => observer.observe(card));
      
      document.getElementById('stat-total').textContent = espacos.length;
    }

    function filtrar(cat, btn) {
      filtroAtual = cat;
      document.querySelectorAll('.cat-filter-btn').forEach(b => b.classList.remove('ativo'));
      btn.classList.add('ativo');
      renderizarEspacos();
      toast(`Filtrando: ${cat === 'todos' ? 'Todos os espaços' : cat}`, 'azul');
    }

    function abrirDrawer(id) {
      espacoSelecionado = espacos.find(e => e.id === id);
      if (!espacoSelecionado) return;
      document.getElementById('drawer-foto-img').src = espacoSelecionado.fotos[0];
      document.getElementById('drawer-cat-label').textContent = espacoSelecionado.categoria;
      document.getElementById('drawer-titulo').textContent = espacoSelecionado.nome;
      document.getElementById('drawer-desc').textContent = espacoSelecionado.descricao;
      document.getElementById('drawer-badges').innerHTML = `<span class="pill pill-${getCategoriaCor(espacoSelecionado.categoria)}">${espacoSelecionado.categoria}</span><span class="pill pill-verde">✓ Disponível</span>`;
      document.getElementById('drawer-specs').innerHTML = `
        <div class="drawer-spec"><div class="drawer-spec-icon">👥</div><div class="drawer-spec-label">Capacidade</div><div class="drawer-spec-val">${espacoSelecionado.capacidade} pessoas</div></div>
        <div class="drawer-spec"><div class="drawer-spec-icon">🕒</div><div class="drawer-spec-label">Horários</div><div class="drawer-spec-val">${espacoSelecionado.horarios}</div></div>`;
      document.getElementById('drawer-regras').style.display = 'block';
      document.getElementById('drawer-regras').innerHTML = `<strong>⚠️ Regras:</strong> ${espacoSelecionado.regras}`;
      document.getElementById('drawer-antec').textContent = espacoSelecionado.antecedencia;
      document.getElementById('drawer-overlay').classList.add('open');
      document.getElementById('drawer').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function fecharDrawer() {
      document.getElementById('drawer-overlay').classList.remove('open');
      document.getElementById('drawer').classList.remove('open');
      document.body.style.overflow = '';
    }

    function selecionarEspacoEReservar(id) {
      espacoSelecionado = espacos.find(e => e.id === id);
      abrirFormulario();
    }

    function abrirFormulario() {
      if (!espacoSelecionado) return;
      passoAtual = 1;
      dataSelecionada = null;
      document.getElementById('modal-titulo').textContent = `Reserva — ${espacoSelecionado.nome}`;
      document.getElementById('form-espaco-nome').textContent = espacoSelecionado.nome;
      document.getElementById('form-espaco-info').textContent = `${espacoSelecionado.categoria} · Até ${espacoSelecionado.capacidade} pessoas`;
      document.getElementById('f-nome').value = '';
      document.getElementById('f-mat').value = '';
      document.getElementById('f-email').value = '';
      document.getElementById('f-tel').value = '';
      document.getElementById('f-pessoas').value = '';
      document.getElementById('f-obs').value = '';
      document.getElementById('sucesso-wrap').style.display = 'none';
      document.getElementById('resumo-wrap').style.display = 'block';
      document.getElementById('fs-erro-box').style.display = 'none';
      document.getElementById('data-chip').style.display = 'none';
      calMes = new Date().getMonth();
      calAno = new Date().getFullYear();
      renderizarPasso(1);
      document.getElementById('modal-formulario').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function fecharFormulario() {
      document.getElementById('modal-formulario').classList.remove('open');
      document.body.style.overflow = '';
    }

    function renderizarPasso(p) {
      passoAtual = p;
      [1,2,3].forEach(n => {
        document.getElementById(`passo${n}`).style.display = n === p ? 'block' : 'none';
        const circ = document.getElementById(`stp${n}`);
        const lbl = document.getElementById(`stp${n}-lbl`);
        circ.className = `stp-circle${n < p ? ' feito' : n === p ? ' ativo' : ''}`;
        lbl.className = `stp-label${n < p ? ' feito' : n === p ? ' ativo' : ''}`;
        if (n > 1) {
          const linha = document.getElementById(`linha${n === 2 ? '12' : '23'}`);
          if (linha) linha.className = `stp-linha${n <= p ? ' feita' : ''}`;
        }
      });
      document.getElementById('btn-voltar').style.display = p > 1 ? 'inline-flex' : 'none';
      const btnAv = document.getElementById('btn-avancar');
      btnAv.textContent = p === 3 ? '✅ Confirmar e Enviar' : 'Avançar →';
      if (p === 2) renderizarCalendario();
      if (p === 3) construirResumo();
    }

    function passoAvancar() {
      if (passoAtual === 1) { if (validarPasso1()) renderizarPasso(2); }
      else if (passoAtual === 2) { if (validarPasso2()) renderizarPasso(3); }
      else if (passoAtual === 3) { enviarSolicitacao(); }
    }
    function passoVoltar() { if (passoAtual > 1) renderizarPasso(passoAtual - 1); }

    function validarPasso1() {
      if (!document.getElementById('f-nome').value.trim()) { toast('Preencha seu nome', 'azul'); return false; }
      if (document.getElementById('f-mat').value.trim().length !== 6) { toast('Matrícula deve ter 6 dígitos', 'azul'); return false; }
      if (!document.getElementById('f-email').value.includes('@')) { toast('E-mail inválido', 'azul'); return false; }
      return true;
    }

    function validarPasso2() {
      if (!dataSelecionada) { toast('Selecione uma data', 'azul'); return false; }
      if (!document.getElementById('f-hi').value || !document.getElementById('f-hf').value) { toast('Selecione horários', 'azul'); return false; }
      if (parseInt(document.getElementById('f-pessoas').value) > espacoSelecionado.capacidade) { toast(`Capacidade máxima: ${espacoSelecionado.capacidade}`, 'azul'); return false; }
      return true;
    }

    function construirResumo() {
      const [ano, mes, dia] = dataSelecionada.split('-');
      document.getElementById('resumo-content').innerHTML = `
        <div class="resumo-row"><span class="resumo-label">Espaço</span><span class="resumo-val">${espacoSelecionado.nome}</span></div>
        <div class="resumo-row"><span class="resumo-label">Data</span><span class="resumo-val">${dia}/${mes}/${ano}</span></div>
        <div class="resumo-row"><span class="resumo-label">Horário</span><span class="resumo-val">${document.getElementById('f-hi').value} às ${document.getElementById('f-hf').value}</span></div>
        <div class="resumo-row"><span class="resumo-label">Pessoas</span><span class="resumo-val">${document.getElementById('f-pessoas').value}</span></div>
        <div class="resumo-row"><span class="resumo-label">Solicitante</span><span class="resumo-val">${document.getElementById('f-nome').value}</span></div>`;
    }

    function enviarSolicitacao() {
      if (!document.getElementById('f-termos').checked) { toast('Aceite os termos', 'azul'); return; }
      const protocolo = 'SRP-' + Date.now().toString(36).toUpperCase();
      document.getElementById('resumo-wrap').style.display = 'none';
      document.getElementById('sucesso-wrap').style.display = 'block';
      document.getElementById('sucesso-protocolo').textContent = `Protocolo: ${protocolo}`;
      document.getElementById('modal-footer-btns').style.display = 'none';
      toast('✅ Solicitação enviada com sucesso!', 'verde');
    }

    function renderizarCalendario() {
      document.getElementById('cal-mes-titulo').textContent = `${MESES[calMes]} ${calAno}`;
      const hoje = new Date(); hoje.setHours(0,0,0,0);
      let html = DIAS_S.map(d => `<div class="cal-header-dia">${d}</div>`).join('');
      const primeiroDia = new Date(calAno, calMes, 1).getDay();
      const totalDias = new Date(calAno, calMes + 1, 0).getDate();
      for (let i = 0; i < primeiroDia; i++) html += '<div class="cal-dia vazio"></div>';
      for (let d = 1; d <= totalDias; d++) {
        const dt = new Date(calAno, calMes, d);
        const passado = dt < hoje;
        const strData = `${calAno}-${String(calMes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const selecionado = dataSelecionada === strData;
        const classe = passado ? 'passado' : selecionado ? 'sel' : '';
        const onClick = !passado ? `onclick="selecionarData('${strData}', ${d})"` : '';
        html += `<div class="cal-dia ${classe}" ${onClick}>${d}</div>`;
      }
      document.getElementById('cal-grid').innerHTML = html;
    }

    function selecionarData(strData, dia) {
      dataSelecionada = strData;
      const [ano, mes] = strData.split('-');
      document.getElementById('data-chip-txt').textContent = `${String(dia).padStart(2,'0')}/${mes}/${ano} selecionado`;
      document.getElementById('data-chip').style.display = 'flex';
      renderizarCalendario();
    }

    function navCal(dir) {
      calMes += dir;
      if (calMes > 11) { calMes = 0; calAno++; }
      if (calMes < 0) { calMes = 11; calAno--; }
      renderizarCalendario();
    }

    function gerarHorarios() {
      const opts = ['<option value="">Selecione</option>'];
      for (let h = 7; h <= 22; h++) {
        opts.push(`<option value="${h}:00">${h}:00</option>`);
        opts.push(`<option value="${h}:30">${h}:30</option>`);
      }
      document.getElementById('f-hi').innerHTML = opts.join('');
      document.getElementById('f-hf').innerHTML = opts.join('');
    }

    function toggleTema() {
      const html = document.documentElement;
      const novo = html.getAttribute('data-tema') === 'claro' ? 'escuro' : 'claro';
      html.setAttribute('data-tema', novo);
      localStorage.setItem('sesc_tema', novo);
      const svg = document.getElementById('icon-tema');
      if (svg) {
        svg.innerHTML = novo === 'escuro'
          ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
          : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
      }
    }

    function toast(msg, tipo) {
      const toastsDiv = document.getElementById('toasts');
      const toastEl = document.createElement('div');
      toastEl.className = `toast toast-${tipo}`;
      toastEl.innerHTML = `<span>${tipo === 'verde' ? '✅' : 'ℹ️'}</span><span>${msg}</span>`;
      toastsDiv.appendChild(toastEl);
      setTimeout(() => {
        toastEl.classList.add('fadeout');
        setTimeout(() => toastEl.remove(), 300);
      }, 4000);
    }

    (function aplicarTemaSalvo() {
      const salvo = localStorage.getItem('sesc_tema');
      if (salvo === 'escuro') document.documentElement.setAttribute('data-tema', 'escuro');
      else document.documentElement.setAttribute('data-tema', 'claro');
    })();

    gerarHorarios();
    renderizarEspacos();
  </script>
</body>
</html>
