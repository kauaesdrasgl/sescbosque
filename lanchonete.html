<!doctype html>
<html lang="pt-BR" data-tema="claro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lanchonete — Sesc Bosque</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,500&family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ===== MESMO CSS DO SEU ARQUIVO ORIGINAL (mantenha exatamente igual) ===== */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --primaria: #f5a800;
        --primaria-escura: #d48f00;
        --primaria-p: #fff8e7;
        --primaria-m: #ffe7b3;
        --verde: #15803d;
        --verde-p: #dcfce7;
        --red: #dc2626;
        --red-p: #fee2e2;
        --bg: #f5f7fa;
        --surface: #ffffff;
        --surface-2: #f9fafb;
        --border: #e4e7ed;
        --text-1: #111827;
        --text-2: #374151;
        --text-3: #6b7280;
        --text-4: #9ca3af;
        --s1: 0 1px 4px rgba(0, 0, 0, 0.06);
        --s2: 0 4px 16px rgba(0, 0, 0, 0.09);
        --s3: 0 8px 32px rgba(0, 0, 0, 0.13);
        --r1: 8px;
        --r2: 12px;
        --r3: 16px;
        --r4: 24px;
        --fd: "Fraunces", Georgia, serif;
        --fb: "Outfit", "Segoe UI", sans-serif;
        --ease: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      [data-tema="escuro"] {
        --bg: #0d1117;
        --surface: #161b22;
        --surface-2: #1c2128;
        --border: #30363d;
        --text-1: #e6edf3;
        --text-2: #c9d1d9;
        --text-3: #8b949e;
        --text-4: #6e7681;
        --primaria-p: rgba(245, 168, 0, 0.22);
        --primaria-m: rgba(245, 168, 0, 0.4);
        --verde-p: rgba(21, 128, 61, 0.18);
        --red-p: rgba(220, 38, 38, 0.18);
        --s1: 0 1px 4px rgba(0, 0, 0, 0.5);
        --s2: 0 4px 16px rgba(0, 0, 0, 0.35);
        --s3: 0 8px 32px rgba(0, 0, 0, 0.4);
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: var(--fb);
        background: var(--bg);
        color: var(--text-1);
        line-height: 1.6;
        transition:
          background 0.3s,
          color 0.3s;
      }

      img {
        display: block;
        max-width: 100%;
      }

      button {
        cursor: pointer;
        border: none;
        background: none;
        font-family: var(--fb);
      }

      /* HEADER */
      #header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(12px);
      }

      .logo-header {
        height: auto;
        width: 3vi;
        min-width: 45px;
      }

      .header-inner {
        max-width: 1000px;
        margin: 0 auto;
        padding: 0 1.5rem;
        height: 3vi;
        min-height: 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .brand-name {
        font-family: var(--fd);
        font-size: 0.95rem;
        font-weight: 900;
        color: #fff;
      }

      .brand-sub {
        font-size: 0.62rem;
        color: rgba(255, 255, 255, 0.6);
        text-transform: uppercase;
        letter-spacing: 0.07em;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .btn-tema {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.8);
        transition: var(--ease);
      }

      .btn-tema:hover {
        background: rgba(255, 255, 255, 0.22);
      }

      /* HERO */
      .page-hero {
        background: linear-gradient(
          160deg,
          #4a1e00 0%,
          #7a3200 60%,
          #a84400 100%
        );
        padding: 3rem 1.5rem 2.5rem;
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .logo-geral {
        margin: 0 auto;
        width: 25vi;
        color: var(--primaria-p);
      }

      .page-hero-title {
        font-family: var(--fd);
        font-size: clamp(1.8rem, 5vw, 2.8rem);
        font-weight: 900;
        color: #fff;
        letter-spacing: -0.02em;
        margin-bottom: 0.5rem;
      }

      .page-hero-desc {
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.7);
        max-width: 420px;
        margin: 0 auto;
        text-decoration: none;
        display: inline-block;
      }

      .page-hero-desc:hover {
        cursor: pointer;
      }

      /* FILTROS */
      .filtros-bar {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 58px;
        z-index: 90;
        transition: background 0.3s;
      }

      .filtros-inner {
        max-width: 1000px;
        margin: 0 auto;
        padding: 0.75rem 1.5rem;
        display: flex;
        gap: 0.5rem;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .filtros-inner::-webkit-scrollbar {
        display: none;
      }

      .filtro-btn {
        flex-shrink: 0;
        padding: 0.45rem 1rem;
        border-radius: 100px;
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--text-3);
        background: var(--surface-2);
        border: 1px solid var(--border);
        transition: var(--ease);
        white-space: nowrap;
      }

      .filtro-btn:hover {
        background: var(--primaria-p);
        color: var(--primaria-escura);
        border-color: var(--primaria-m);
      }

      .filtro-btn.ativo {
        background: var(--primaria);
        color: #fff;
        border-color: var(--primaria);
      }

      /* CONTEÚDO */
      .content {
        max-width: 1000px;
        margin: 0 auto;
        padding: 2rem 1.5rem 4rem;
      }

      .section-title {
        font-family: var(--fd);
        font-size: 1.25rem;
        font-weight: 900;
        letter-spacing: -0.02em;
        color: var(--text-1);
        margin: 2rem 0 1rem;
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }

      .section-title::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .section-count {
        font-size: 0.7rem;
        font-weight: 600;
        color: var(--text-4);
        font-family: var(--fb);
      }

      .menu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1rem;
      }

      /* CARD */
      .item-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r3);
        overflow: hidden;
        box-shadow: var(--s1);
        transition:
          transform var(--ease),
          box-shadow var(--ease);
      }

      .item-card:hover {
        transform: translateY(-3px);
        box-shadow: var(--s2);
      }

      .item-img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        background: var(--surface-2);
      }

      .item-badges {
        position: absolute;
        top: 0.75rem;
        left: 0.75rem;
        display: flex;
        gap: 0.35rem;
        flex-wrap: wrap;
      }

      .badge {
        padding: 0.22rem 0.65rem;
        border-radius: 100px;
        font-size: 0.62rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      .badge-destaque {
        background: var(--primaria);
        color: #fff;
      }

      .item-body {
        padding: 1rem 1.1rem 1.1rem;
      }

      .item-name {
        font-family: var(--fd);
        font-size: 1.05rem;
        font-weight: 900;
        color: var(--text-1);
        margin-bottom: 0.3rem;
      }

      .item-desc {
        font-size: 0.78rem;
        color: var(--text-3);
        line-height: 1.55;
        margin-bottom: 0.85rem;
      }

      .item-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.3rem;
        margin-bottom: 0.85rem;
      }

      .item-tag {
        font-size: 0.62rem;
        font-weight: 600;
        padding: 0.18rem 0.55rem;
        border-radius: 100px;
        background: var(--primaria-p);
        color: var(--primaria-escura);
      }

      .item-price {
        display: flex;
        align-items: baseline;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .price-sesc {
        font-family: var(--fd);
        font-size: 1.35rem;
        font-weight: 900;
        color: var(--primaria);
      }

      .price-label {
        font-size: 0.65rem;
        font-weight: 700;
        color: var(--text-4);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .price-pub {
        font-size: 0.8rem;
        color: var(--text-4);
        text-decoration: line-through;
      }

      .price-badge {
        font-size: 0.65rem;
        font-weight: 700;
        padding: 0.15rem 0.55rem;
        background: var(--verde-p);
        color: var(--verde);
        border-radius: 100px;
      }

      /* ESTADOS VAZIOS */
      .empty-state {
        text-align: center;
        padding: 4rem 1rem;
        color: var(--text-4);
      }

      .empty-state svg {
        margin: 0 auto 1rem;
        opacity: 0.4;
      }

      /* FOOTER */
      footer {
        background: var(--surface);
        border-top: 1px solid var(--border);
        padding: 1.25rem 1.5rem;
        text-align: center;
        font-size: 0.73rem;
        color: var(--text-4);
      }

      footer strong {
        color: var(--text-3);
      }

      /* TOAST */
      #toasts {
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        z-index: 9999;
      }

      .toast {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r2);
        padding: 0.65rem 1rem;
        font-size: 0.8rem;
        font-weight: 500;
        box-shadow: var(--s2);
        animation: slideIn 0.25s ease;
        max-width: 280px;
      }

      .toast.fadeout {
        animation: fadeOut 0.3s ease forwards;
      }

      .toast-verde {
        color: #166534;
        border-color: #bbf7d0;
      }

      .toast-azul {
        color: var(--primaria);
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }

        to {
          opacity: 1;
          transform: none;
        }
      }

      @keyframes fadeOut {
        to {
          opacity: 0;
          transform: translateY(8px);
        }
      }

      @media (max-width: 480px) {
        .page-hero {
          padding: 2rem 1rem 1.5rem;
        }

        .content {
          padding: 1.5rem 1rem 3rem;
        }

        .menu-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <header id="header">
      <div class="header-inner">
        <div class="brand">
          <div class="logo-header">
            <img src="./logos/Logo Sesc padrão  White (536x536).svg" alt="" />
          </div>
        </div>
        <div class="header-right">
          <button class="btn-tema" onclick="toggleTema()" aria-label="Tema">
            <svg
              id="icon-tema"
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="5" />
              <line x1="12" y1="1" x2="12" y2="3" />
              <line x1="12" y1="21" x2="12" y2="23" />
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
              <line x1="1" y1="12" x2="3" y2="12" />
              <line x1="21" y1="12" x2="23" y2="12" />
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <div class="page-hero">
      <div class="logo-geral">
        <h1 class="page-hero-title">Lanchonete</h1>
        <div>
          <a class="page-hero-desc" target="_blank" href="https://sescacre.framer.website/credencial">clique aqui para ser um <b>Associado Sesc</b></a>
        </div>
      </div>
    </div>

    <div class="filtros-bar">
      <div class="filtros-inner" id="filtros-container">
        <button class="filtro-btn ativo" onclick="filtrar('todos', this)">
          Todos
        </button>
      </div>
    </div>

    <main class="content" id="menu-content">
      <div class="empty-state">
        <svg
          width="48"
          height="48"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
        >
          <circle cx="12" cy="12" r="10" />
          <polyline points="12 6 12 12 16 14" />
        </svg>
        <p>Carregando cardápio da lanchonete…</p>
      </div>
    </main>

    <footer>
      <strong>Sesc Bosque — Lanchonete</strong> • Sabores que renovam sua
      energia
    </footer>

    <div id="toasts"></div>

    <!-- ========== SCRIPT CENTRAL (AppData) ========== -->
    <script src="./script.js"></script>

    <script>
      // ========== PÁGINA LANCHONETE INTEGRADA AO AppData ==========
      let filtroAtivo = "todos";
      let dadosLanchonete = [];
      let categoriasDisponiveis = [];

      function carregarDadosGlobal() {
        const dadosCompletos = AppData.carregar();
        const lanchonete = dadosCompletos.menu.lanchonete;
        dadosLanchonete = lanchonete.itens || [];
        categoriasDisponiveis = lanchonete.categorias || [];

        // Garante que as categorias estão na ordem padrão (opcional, mas melhora a exibição)
        const ordemPadrao = [
          "Lanches",
          "Salgados",
          "Sucos & Vitaminas",
          "Cafés & Bebidas Quentes",
          "Doces & Bolos",
        ];
        categoriasDisponiveis.sort((a, b) => {
          let ia = ordemPadrao.indexOf(a);
          let ib = ordemPadrao.indexOf(b);
          if (ia === -1 && ib === -1) return 0;
          if (ia === -1) return 1;
          if (ib === -1) return -1;
          return ia - ib;
        });
      }

      function renderFiltros() {
        const container = document.getElementById("filtros-container");
        if (!container) return;
        const catsComItens = categoriasDisponiveis.filter((c) =>
          dadosLanchonete.some((i) => i.categoria === c),
        );
        container.innerHTML =
          `<button class="filtro-btn ${filtroAtivo === "todos" ? "ativo" : ""}" onclick="filtrar('todos', this)">Todos</button>` +
          catsComItens
            .map(
              (c) =>
                `<button class="filtro-btn ${filtroAtivo === c ? "ativo" : ""}" onclick="filtrar('${c.replace(/'/g, "\\'")}', this)">${c}</button>`,
            )
            .join("");
      }

      function filtrar(cat, btn) {
        filtroAtivo = cat;
        document
          .querySelectorAll(".filtro-btn")
          .forEach((b) => b.classList.remove("ativo"));
        if (btn) btn.classList.add("ativo");
        renderCardapio();
      }

      function renderCardapio() {
        const container = document.getElementById("menu-content");
        if (!container) return;

        const itensVisiveis = dadosLanchonete.filter(
          (i) => i.disponivel !== false,
        );
        const catsExibir =
          filtroAtivo === "todos"
            ? categoriasDisponiveis.filter((c) =>
                itensVisiveis.some((i) => i.categoria === c),
              )
            : [filtroAtivo];

        if (!itensVisiveis.length) {
          container.innerHTML = `<div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <p>Nenhum item disponível no momento.</p>
      </div>`;
          return;
        }

        let html = "";
        catsExibir.forEach((cat) => {
          const itensFiltrados = itensVisiveis.filter(
            (i) => i.categoria === cat,
          );
          if (!itensFiltrados.length) return;
          const total = itensFiltrados.length;
          html += `<h2 class="section-title">${cat} <span class="section-count">${total} ${total === 1 ? "item" : "itens"}</span></h2>`;
          html += `<div class="menu-grid">${itensFiltrados.map(renderItem).join("")}</div>`;
        });

        container.innerHTML =
          html ||
          `<div class="empty-state"><svg width="48" height="48" ...></svg><p>Nenhum item nessa categoria.</p></div>`;
      }

      function renderItem(item) {
        const pub = item.precoPublico ?? 0;
        const sesc = item.precoSesc ?? pub;
        const desconto =
          pub > 0 && sesc < pub ? Math.round((1 - sesc / pub) * 100) : 0;
        const tags = item.tags || [];

        return `<div class="item-card">
      <div style="position:relative">
        <img class="item-img"
          src="${item.img || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400"}"
          alt="${item.nome}" loading="lazy"
          onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400'">
        <div class="item-badges">
          ${item.destaque ? '<span class="badge badge-destaque">⭐ Destaque</span>' : ""}
        </div>
      </div>
      <div class="item-body">
        <div class="item-name">${item.nome}</div>
        <div class="item-desc">${item.descricao || ""}</div>
        ${tags.length ? `<div class="item-tags">${tags.map((t) => `<span class="item-tag">${t}</span>`).join("")}</div>` : ""}
        <div class="item-price">
          <div>
            <div class="price-label">Associado Sesc</div>
            <div class="price-sesc">R$ ${sesc.toFixed(2).replace(".", ",")}</div>
          </div>
          ${
            desconto > 0
              ? `<span class="price-pub">R$ ${pub.toFixed(2).replace(".", ",")}</span>
             <span class="price-badge">-${desconto}%</span>`
              : ""
          }
        </div>
      </div>
    </div>`;
      }

      // Sincroniza quando o admin salvar em outra aba
      window.addEventListener("storage", function (e) {
        if (e.key === "sesc_menu") {
          carregarDadosGlobal();
          renderFiltros();
          renderCardapio();
          toast("Cardápio atualizado pelo painel admin!", "verde");
        }
      });

      // Escuta também evento customizado (caso usado internamente)
      window.addEventListener("dataAtualizada", function () {
        carregarDadosGlobal();
        renderFiltros();
        renderCardapio();
        toast("Dados atualizados!", "azul");
      });

      // Inicialização
      function init() {
        carregarDadosGlobal();
        renderFiltros();
        renderCardapio();
        toast("Cardápio da lanchonete carregado!", "azul");
        console.info(
          "[Lanchonete] Integrado ao AppData. Itens:",
          dadosLanchonete.length,
        );
      }

      // Tema (usa a mesma função do script.js, mas garante compatibilidade)
      function toggleTema() {
        const html = document.documentElement;
        const novo =
          html.getAttribute("data-tema") === "claro" ? "escuro" : "claro";
        html.setAttribute("data-tema", novo);
        localStorage.setItem("sesc_tema", novo);
        const svg = document.getElementById("icon-tema");
        if (svg) {
          svg.innerHTML =
            novo === "escuro"
              ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
              : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
        }
      }

      function toast(msg, tipo = "azul") {
        const toastsDiv = document.getElementById("toasts");
        const toastEl = document.createElement("div");
        toastEl.className = `toast toast-${tipo}`;
        toastEl.innerHTML = `<span>${tipo === "verde" ? "✅" : "☕"}</span><span>${msg}</span>`;
        toastsDiv.appendChild(toastEl);
        setTimeout(() => {
          toastEl.classList.add("fadeout");
          setTimeout(() => toastEl.remove(), 300);
        }, 3500);
      }

      // Aplicar tema salvo
      (function aplicarTemaSalvo() {
        const salvo = localStorage.getItem("sesc_tema");
        if (salvo === "escuro")
          document.documentElement.setAttribute("data-tema", "escuro");
        else document.documentElement.setAttribute("data-tema", "claro");
      })();

      init();
    </script>
  </body>
</html>
